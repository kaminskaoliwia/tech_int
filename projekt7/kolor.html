<body>
<p onmousedown="changeColors(this, 'red', '24pt')" onmouseup="changeColors(this, 'green', '18pt')">
    Nacisnij i przytrzymaj klawisz myszy, nastepnie zwolnij klawisz
</p>

<script>
    function changeColors(element, color, size)
    {
        element.style.color = color;
        element.style.fontSize=size;
    }
</script>
</body>
